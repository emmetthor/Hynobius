name: Sanitizers

on:
  push:
    branches-ignore:
      - main
    # for testing. it will change to branches [main] if success
  pull_request:
    branches: [main]

jobs:
  sanitizers:
    name: ${{ matrix.name }}
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ASan + UBSan
            compiler: clang++
            cxxflags: "-fsanitize=address,undefined -fno-omit-frame-pointer -g"
            ldflags: "-fsanitize=address,undefined"
          - name: TSan
            compiler: clang++
            cxxflags: "-fsanitize=thread -fno-omit-frame-pointer -g"
            ldflags: "-fsanitize=thread"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER="${{ matrix.compiler }}" \
            -DCMAKE_CXX_FLAGS="${{ matrix.cxxflags }}" \
            -DCMAKE_EXE_LINKER_FLAGS="${{ matrix.ldflags }}"

      - name: Build
        run: cmake --build build

      - name: Run tests
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
          TSAN_OPTIONS: halt_on_error=1
        run: ctest --test-dir build --output-on-failure